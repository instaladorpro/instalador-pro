<span class="kw">export default function</span> <span class="fn">RegisterScreen</span>() {
  <span class="kw">const</span> [form, setForm] = <span class="fn">useState</span>({
    nome: <span class="str">''</span>, email: <span class="str">''</span>, password: <span class="str">''</span>, confirmPassword: <span class="str">''</span>
  })
  <span class="kw">const</span> [loading, setLoading] = <span class="fn">useState</span>(<span class="kw">false</span>)

  <span class="kw">function</span> <span class="fn">update</span>(field: <span class="kw">keyof typeof</span> form, value: <span class="ty">string</span>) {
    <span class="fn">setForm</span>(prev => ({ ...prev, [field]: value }))
  }

  <span class="kw">async function</span> <span class="fn">handleRegister</span>() {
    <span class="kw">const</span> { nome, email, password, confirmPassword } = form
    <span class="kw">if</span> (!nome || !email || !password) {
      <span class="kw">return</span> <span class="fn">Alert</span>.<span class="fn">alert</span>(<span class="str">'Atenção'</span>, <span class="str">'Preencha todos os campos'</span>)
    }
    <span class="kw">if</span> (password !== confirmPassword) {
      <span class="kw">return</span> <span class="fn">Alert</span>.<span class="fn">alert</span>(<span class="str">'Atenção'</span>, <span class="str">'As senhas não coincidem'</span>)
    }
    <span class="kw">if</span> (password.length < 6) {
      <span class="kw">return</span> <span class="fn">Alert</span>.<span class="fn">alert</span>(<span class="str">'Atenção'</span>, <span class="str">'Senha mínima: 6 caracteres'</span>)
    }
    <span class="kw">try</span> {
      <span class="fn">setLoading</span>(<span class="kw">true</span>)
      <span class="kw">await</span> authService.<span class="fn">signUp</span>(email.<span class="fn">trim</span>(), password, nome.<span class="fn">trim</span>())
      <span class="fn">Alert</span>.<span class="fn">alert</span>(
        <span class="str">'Conta criada!'</span>,
        <span class="str">'Verifique seu email para confirmar o cadastro.'</span>,
        [{ text: <span class="str">'OK'</span>, onPress: () => router.<span class="fn">replace</span>(<span class="str">'/(auth)/login'</span>) }]
      )
    } <span class="kw">catch</span> (err: <span class="kw">any</span>) {
      <span class="fn">Alert</span>.<span class="fn">alert</span>(<span class="str">'Erro'</span>, err.message)
    } <span class="kw">finally</span> {
      <span class="fn">setLoading</span>(<span class="kw">false</span>)
    }
  }

  <span class="kw">return</span> (
    &lt;<span class="ty">ScrollView</span> contentContainerStyle={styles.container}&gt;
      &lt;<span class="ty">Text</span> style={styles.title}&gt;Criar conta&lt;/<span class="ty">Text</span>&gt;

      {([<span class="str">'nome'</span>, <span class="str">'email'</span>, <span class="str">'password'</span>, <span class="str">'confirmPassword'</span>] <span class="kw">as const</span>).<span class="fn">map</span>(field => (
        &lt;<span class="ty">TextInput</span>
          key={field}
          style={styles.input}
          placeholder={{
            nome: <span class="str">'Nome completo'</span>, email: <span class="str">'Email'</span>,
            password: <span class="str">'Senha'</span>, confirmPassword: <span class="str">'Confirmar senha'</span>
          }[field]}
          value={form[field]}
          onChangeText={v => <span class="fn">update</span>(field, v)}
          secureTextEntry={field === <span class="str">'password'</span> || field === <span class="str">'confirmPassword'</span>}
          keyboardType={field === <span class="str">'email'</span> ? <span class="str">'email-address'</span> : <span class="str">'default'</span>}
          autoCapitalize={field === <span class="str">'nome'</span> ? <span class="str">'words'</span> : <span class="str">'none'</span>}
        /&gt;
      ))}

      &lt;<span class="ty">TouchableOpacity</span>
        style={[styles.btn, loading && styles.btnDisabled]}
        onPress={handleRegister} disabled={loading}
      &gt;
        {loading
          ? &lt;<span class="ty">ActivityIndicator</span> color=<span class="str">"#fff"</span>/&gt;
          : &lt;<span class="ty">Text</span> style={styles.btnText}&gt;Criar conta&lt;/<span class="ty">Text</span>&gt;}
      &lt;/<span class="ty">TouchableOpacity</span>&gt;

      &lt;<span class="ty">TouchableOpacity</span> onPress={() => router.<span class="fn">back</span>()}&gt;
        &lt;<span class="ty">Text</span> style={styles.link}&gt;Já tenho conta&lt;/<span class="ty">Text</span>&gt;
      &lt;/<span class="ty">TouchableOpacity</span>&gt;
    &lt;/<span class="ty">ScrollView</span>&gt;
  )
}

<span class="kw">const</span> styles = <span class="fn">StyleSheet</span>.<span class="fn">create</span>({
  container: { padding: 24, paddingTop: 60, backgroundColor: <span class="str">'#fff'</span> },
  title: { fontSize: 26, fontWeight: <span class="str">'700'</span>, color: <span class="str">'#1a1a2e'</span>, marginBottom: 24 },
  input: { borderWidth: 1, borderColor: <span class="str">'#e0e0e0'</span>, borderRadius: 10,
    padding: 14, fontSize: 15, marginBottom: 12, backgroundColor: <span class="str">'#fafafa'</span> },
  btn: { backgroundColor: <span class="str">'#534AB7'</span>, borderRadius: 10,
    padding: 16, alignItems: <span class="str">'center'</span>, marginTop: 8 },
  btnDisabled: { opacity: 0.6 },
  btnText: { color: <span class="str">'#fff'</span>, fontWeight: <span class="str">'600'</span>, fontSize: 15 },
  link: { textAlign: <span class="str">'center'</span>, color: <span class="str">'#534AB7'</span>, marginTop: 16, fontSize: 14 },
})`
      }
    ]
  },
  {
    section: 'app',
    color: '#993C1D',
    items: [
      {
        name: '_layout.tsx (raiz)',
        lang: 'tsx',
        code: `<span class="kw">import</span> { useEffect } <span class="kw">from</span> <span class="str">'react'</span>
<span class="kw">import</span> { Slot, router } <span class="kw">from</span> <span class="str">'expo-router'</span>
<span class="kw">import</span> { QueryClient, QueryClientProvider } <span class="kw">from</span> <span class="str">'@tanstack/react-query'</span>
<span class="kw">import</span> { useAuthStore } <span class="kw">from</span> <span class="str">'../src/store/auth.store'</span>
<span class="kw">import</span> { authService } <span class="kw">from</span> <span class="str">'../src/services/auth.service'</span>

<span class="kw">const</span> queryClient = <span class="kw">new</span> <span class="fn">QueryClient</span>()

<span class="kw">export default function</span> <span class="fn">RootLayout</span>() {
  <span class="kw">const</span> { setSession, isLoading } = <span class="fn">useAuthStore</span>()

  <span class="fn">useEffect</span>(() => {
    <span class="cm">// Carrega sessão existente na inicialização</span>
    authService.<span class="fn">getSession</span>().<span class="fn">then</span>(({ data }) => {
      <span class="fn">setSession</span>(data.session)
      router.<span class="fn">replace</span>(data.session ? <span class="str">'/(tabs)'</span> : <span class="str">'/(auth)/login'</span>)
    })

    <span class="cm">// Ouve mudanças de autenticação em tempo real</span>
    <span class="kw">const</span> { data: listener } = authService.<span class="fn">onAuthStateChange</span>(
      (_event, session) => {
        <span class="fn">setSession</span>(session)
        <span class="kw">if</span> (!session) router.<span class="fn">replace</span>(<span class="str">'/(auth)/login'</span>)
      }
    )

    <span class="kw">return</span> () => listener.subscription.<span class="fn">unsubscribe</span>()
  }, [])

  <span class="kw">if</span> (isLoading) <span class="kw">return null</span> <span class="cm">// Splash nativo cobre isso</span>

  <span class="kw">return</span> (
    &lt;<span class="ty">QueryClientProvider</span> client={queryClient}&gt;
      &lt;<span class="ty">Slot</span> /&gt;
    &lt;/<span class="ty">QueryClientProvider</span>&gt;
  )
}`
      }
    ]
  }
]

const sidebar = document.getElementById('sidebar')
const codeDisplay = document.getElementById('code-display')
const topbarFilename = document.getElementById('topbar-filename')
const copyBtn = document.getElementById('copy-btn')
let activeItem = null

files.forEach(section => {
  const secDiv = document.createElement('div')
  secDiv.className = 'sidebar-section'
  const label = document.createElement('div')
  label.className = 'sidebar-label'
  label.textContent = section.section
  secDiv.appendChild(label)

  section.items.forEach(item => {
    const el = document.createElement('div')
    el.className = 'file-item'
    el.innerHTML = `<span class="file-dot" style="background:${section.color}"></span>${item.name}`
    el.addEventListener('click', () => {
      document.querySelectorAll('.file-item').forEach(f => f.classList.remove('active'))
      el.classList.add('active')
      codeDisplay.innerHTML = item.code
      topbarFilename.textContent = item.name
      activeItem = item
    })
    secDiv.appendChild(el)
  })
  sidebar.appendChild(secDiv)
})

copyBtn.addEventListener('click', () => {
  if (!activeItem) return
  const text = codeDisplay.innerText
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = 'Copiado!'
    setTimeout(() => copyBtn.textContent = 'Copiar', 2000)
  })
})

// Seleciona o primeiro arquivo automaticamente
sidebar.querySelector('.file-item')?.click()
</script>
